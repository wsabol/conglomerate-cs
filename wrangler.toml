name = "conglomerate-cs"
main = "src/server/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built React SPA. The Worker runs first so it can own /api and
# /media; everything else is delegated to the ASSETS binding (SPA fallback).
[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Only /api and /media hit the Worker first. Leave /cdn-cgi/access/* to
# Cloudflare Access — run_worker_first = true breaks the auth callback.
run_worker_first = ["/api/*", "/media/*"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "conglomerate"
# Placeholder id: local development ignores this. Replace for remote/prod.
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "conglomerate-media"

[stream]
binding = "STREAM"

[vars]
ENVIRONMENT = "development"
# Local-only identity override (Cloudflare Access cannot run in `wrangler dev`).
# MUST be empty / disabled in production (see [env.production]).
DEV_USER_EMAIL = "dev@theconglomerate.local"
DEV_USER_ROLE = "editor"
ACCESS_ENFORCED = "false"
ACCESS_TEAM_DOMAIN = ""
ACCESS_AUD = ""
ACCESS_ACCOUNT_ID = ""
ACCESS_POLICY_ID = ""
APP_BASE_URL = "http://localhost:5173"
APP_ALLOWED_ORIGIN = "http://localhost:5173"
INVITE_FROM_EMAIL = "invites@conglomochat.willsabol.com"
INVITE_TOKEN_TTL_DAYS = "7"
INVITE_THROTTLE_HOURS = "24"

[triggers]
crons = ["*/15 * * * *"]

# ---- Production environment ----------------------------------------------
[env.production]
name = "conglomerate-cs"

[env.production.assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Only /api and /media hit the Worker first. Leave /cdn-cgi/access/*
# Cloudflare Access — run_worker_first = true breaks the auth callback.
run_worker_first = ["/api/*", "/media/*"]

[env.production.observability]
enabled = true

[env.production.triggers]
crons = ["*/15 * * * *"]

[env.production.vars]
ENVIRONMENT = "production"
DEV_USER_EMAIL = ""
DEV_USER_ROLE = ""
ACCESS_ENFORCED = "true"
ACCESS_TEAM_DOMAIN = "wsabol-team.cloudflareaccess.com"
ACCESS_AUD = "d529d2a3185377e0e6b82c6abcb154962f5ee4a87533314e8113cb0d2d70263a"
ACCESS_ACCOUNT_ID = "78ad9e9b375f356c309e38ac02d8f7df"
ACCESS_POLICY_ID = "1a8aea77-922d-4d0f-9bcc-11be0f50c71d"
APP_BASE_URL = "https://conglomerate-cs.wsabol39.workers.dev/"
APP_ALLOWED_ORIGIN = "https://conglomerate-cs.wsabol39.workers.dev"
INVITE_FROM_EMAIL = "invites@conglomochat.willsabol.com"
INVITE_TOKEN_TTL_DAYS = "7"
INVITE_THROTTLE_HOURS = "24"

[[env.production.d1_databases]]
binding = "DB"
database_name = "theconglomerate"
database_id = "272b09d7-9db9-47e1-94fa-0d9a50b2e7cc"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "conglomerate-media"

[env.production.stream]
binding = "STREAM"
